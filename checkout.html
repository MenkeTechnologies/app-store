<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="color-scheme" content="dark light">
  <meta name="description" content="MenkeTechnologies App Store — secure checkout.">
  <title>Checkout — MenkeTechnologies App Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&amp;family=Share+Tech+Mono&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hud-static.css">
  <link rel="stylesheet" href="tutorial.css">
  <link rel="stylesheet" href="store.css">
  <style>
    .tutorial-main { max-width: 70rem; }

<body>
  <div class="app tutorial-app" id="storeApp">

            <span class="sep">/</span>
            <span class="current">Checkout</span>

        <div class="tutorial-toolbar">

          <button type="button" class="btn btn-secondary active" id="btnCrt" title="CRT scanline overlay">CRT</button>
          <button type="button" class="btn btn-secondary active" id="btnNeon" title="Neon border pulse">Neon</button>
        </div>
      </div>

    <main class="tutorial-main">

    <footer class="tutorial-main doc-footer" style="padding-top:0;">
      MenkeTechnologies · All software © Jacob Menke · All transactions are secure and encrypted

  <script src="hud-theme.js"></script>
